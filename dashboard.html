<!DOCTYPE html>

<head>
<meta charset="UTF-8">

<style>
body { margin: 0; font-family: "Segoe UI", sans-serif; color: #111; }
#bg-video { position: fixed; inset: 0; width: 100%; height: 100%; object-fit: cover; z-index: -2; filter: brightness(0.75) saturate(1.4); }

.dashboard-box { max-width: 420px; width: 92%; margin: 20px auto; padding: 20px; border-radius: 22px; background: rgba(255,255,255,0.92); backdrop-filter: blur(16px); box-shadow: 0 15px 35px rgba(0,0,0,0.3); animation: fadeUp 0.5s ease; }
@keyframes fadeUp { from { opacity: 0; transform: translateY(25px); } to { opacity: 1; transform: translateY(0); } }

}

position: fixed;

/* MENU */

top: 0;
left: 0;
width: 100%;

}

.modal-content {

width: 90%;

padding: 20px;

max-height: 80vh;

}

.close {

top: 10px;
right: 15px;
cursor: pointer;
font-size: 18px;
}

.hidden {

}

.history-box {
margin-top: 20px;
background: white;
padding: 15px;
border-radius: 15px;

.arrow-up {

animation: blink 1s infinite;
}

color: green;
animation: blink 1s infinite;
}

@keyframes blink {
0%{opacity:1;}
50%{opacity:0.3;}

}
</style>

<body>

<video autoplay muted loop id="bg-video">
<source src="bg.mp4" type="video/mp4">
</video>

<header class="header">
  <div class="logo">💎 MaliPay</div>

  <div class="header-right">
    <div class="profile-container" onclick="toggleMenu(event)">
      <img id="profilePic" class="profile-pic" src="" alt="profil">

      <div class="status-dot"></div>
      <div class="verified">✔</div>

      <!-- 🔥 BADGE -->
      <div id="notifBadge" class="notif-badge">0</div>
</div>
  </div>
</header>

<div id="userMenu" class="user-menu hidden">

<!-- 🔥 PHOTO PROFIL AGRANDIE -->

<img id="menuProfilePic" src="" alt="profil">
<p id="menuUserName"></p>
<span class="menu-status">● En ligne</span>
</div>

<button onclick="changePhoto()">📸 Changer photo</button>

</div>
<main>
<section class="dashboard-box">

<!-- 🔥 CARTE STYLE 3 -->
<div class="main-card">
  <div>
    <h2 id="welcome"></h2>
    <p>💰 Solde disponible</p>
    <h1 id="solde"></h1>
  </div>

</div>

<!-- 🔥 BOUTONS -->

  <div class="action-box" onclick="openModal('transferBox')">
    💸
    <span>Envoyer</span>
  </div>

  <div class="action-box" onclick="openModal('passwordBox')">
    🔐
    <span>Mot de passe</span>

</div>

    🚪
    <span>Quitter</span>

<!-- 🔥 CONTENU (INVISIBLE AU DÉBUT) -->

<div id="notifBox" style="display:none;"></div>

<div id="passwordBox" style="display:none;">

  <div class="modal-content">
    <span class="close" onclick="closeModal()">✖</span>
    <div id="modalBody"></div>
  </div>
</div>

<div class="history-box" style="max-width:420px;margin:20px auto;">
<h3 onclick="toggleHistory()" style="cursor:pointer;">
🕒 Activités récentes
</h3>

<div id="historyContent" style="display:none;">
<div id="historyList"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import { getDatabase, ref, get, update, push, remove } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-database.js";
import { getStorage, ref as sRef, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-storage.js";
const firebaseConfig = {
  apiKey: "AIzaSyCxBRBCJJL8ljgpL5vIYzvkMQn-1Mlreq8",
  authDomain: "ma-money4.firebaseapp.com",
  databaseURL: "https://ma-money4-default-rtdb.firebaseio.com",
  projectId: "ma-money4",
  storageBucket: "ma-money4.firebasestorage.app", // ✅ TRÈS IMPORTANT
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const storage = getStorage(app);

let currentUser = JSON.parse(localStorage.getItem("loggedUser"));
if(!currentUser) window.location.href="login.html";

const welcome=document.getElementById("welcome");
const soldeBox=document.getElementById("solde");
const messageBox=document.getElementById("message");
const profilePic = document.getElementById("profilePic");
const menuProfilePic = document.getElementById("menuProfilePic");
const menuUserName = document.getElementById("menuUserName");
const notifBox=document.getElementById("notifBox");
const notifBadge = document.getElementById("notifBadge");
const sendBtn=document.getElementById("sendBtn");
const receiverInput=document.getElementById("receiver");
const amountInput=document.getElementById("amount");
const conversionBox=document.getElementById("conversionBox");

welcome.innerText="👋Bienvenue "+currentUser.name;

/* ===== MULTI DEVISE ===== */

const currencyMap={
"+223":{code:"XOF",symbol:"FCFA"},
"+33":{code:"EUR",symbol:"€"},
"+1":{code:"USD",symbol:"$"},
"+44":{code:"GBP",symbol:"£"},
"+234":{code:"NGN",symbol:"₦"},
"+226":{code:"XOF",symbol:"FCFA"},
"+227":{code:"XOF",symbol:"FCFA"},
"+221":{code:"XOF",symbol:"FCFA"},
"+225":{code:"XOF",symbol:"FCFA"},
"+86":{code:"SNY",symbol:"¥"}
};

function normalizePhone(phone){
return phone.replace(/\s+/g,'').replace(/[^+\d]/g,'');
}

function getCurrency(phone){
for(const p in currencyMap){
if(phone.startsWith(p)) return currencyMap[p];
}
return currencyMap["+223"];
}

async function getLiveRate(from,to){
if(from===to) return 1;
try{
const res=await fetch(`https://open.er-api.com/v6/latest/${from}`);
const data=await res.json();
if(data.result==="success" && data.rates[to]){
return data.rates[to];
}
return null;
}catch{
return null;
}
}

function formatMoney(a){ return Number(a).toLocaleString("fr-FR"); }

async function loadBalance(){
  const snap = await get(ref(db,"users/"+currentUser.phone));

  if(snap.exists()){
    currentUser = snap.val();
    localStorage.setItem("loggedUser", JSON.stringify(currentUser));

    const cur = getCurrency(currentUser.phone);
    soldeBox.innerText = formatMoney(currentUser.solde) + " " + cur.symbol;

    // 🔥 PHOTO PROFIL
    let photoUrl = currentUser.photo
      ? currentUser.photo
      : "https://i.imgur.com/6VBx3io.png";

      profilePic.src = photoUrl;
      menuProfilePic.src = photoUrl;
      menuUserName.innerText = currentUser.name;
  }
}
loadBalance();

/* ===== CONVERSION LIVE VISUELLE ===== */

async function updateConversion(){
const receiverPhone=normalizePhone(receiverInput.value.trim());
const amount=parseFloat(amountInput.value);
if(!receiverPhone || !amount){ conversionBox.style.display="none"; return; }

const senderCur=getCurrency(currentUser.phone);
const receiverCur=getCurrency(receiverPhone);

const rate=await getLiveRate(senderCur.code,receiverCur.code);
if(!rate){ conversionBox.style.display="none"; return; }

const converted=amount*rate;

conversionBox.style.display="block";
conversionBox.innerHTML=
`💱 1 ${senderCur.symbol} = ${rate.toFixed(4)} ${receiverCur.symbol}<br>
💰 Destinataire recevra : <strong>${formatMoney(converted)} ${receiverCur.symbol}</strong>`;
}
receiverInput.addEventListener("input",updateConversion);
amountInput.addEventListener("input",updateConversion);

/* ===== ENVOI ARGENT ===== */

window.sendMoney=async function(){

if(sendBtn.disabled) return;
sendBtn.disabled=true;
sendBtn.innerText="⏳Traitement...";

try{

const receiverPhone=normalizePhone(receiverInput.value.trim());
const amount=parseFloat(amountInput.value);
const reason=document.getElementById("reason").value.trim();
const scheduleDate=document.getElementById("scheduleDate").value;

if(!receiverPhone || amount<=0){
messageBox.innerText="❌Données invalides";
resetButton();return;
}

const senderSnap=await get(ref(db,"users/"+currentUser.phone));
const receiverSnap=await get(ref(db,"users/"+receiverPhone));
const treasurySnap=await get(ref(db,"treasury"));

if(!senderSnap.exists()||!receiverSnap.exists()){
messageBox.innerText="❌Compte introuvable";
resetButton();return;
}

let sender=senderSnap.val();
let receiverData=receiverSnap.val();
let treasury=treasurySnap.exists()?treasurySnap.val():{balance:0,rate:0.01};

if(sender.frozen){messageBox.innerText="❌Compte gelé";resetButton();return;}
if(receiverData.frozen){messageBox.innerText="❌Destinataire gelé";resetButton();return;}

const senderCur=getCurrency(sender.phone);
const receiverCur=getCurrency(receiverPhone);
const rate=await getLiveRate(senderCur.code,receiverCur.code);
if(!rate){messageBox.innerText="❌Impossible de récupérer le taux";resetButton();return;}

let convertedAmount=amount*rate;
let fee=amount*treasury.rate;
let total=amount+fee;

if(sender.solde<total){
messageBox.innerText="❌Solde insuffisant";
resetButton();return;
}

/* ===== TRANSFERT PROGRAMMÉ MULTI-DEVISE FIXÉ ===== */

if(scheduleDate){
await push(ref(db,"scheduledTransfers"),{
from:sender.phone,
to:receiverPhone,
amountOriginal:amount,
amountConverted:convertedAmount,
fee:fee,
rateUsed:rate,
senderCurrency:senderCur.code,
receiverCurrency:receiverCur.code,
reason,
scheduledFor:scheduleDate
});
messageBox.innerText="📅Transfert programmé";
resetForm();resetButton();return;
}

/* ===== TRANSFERT IMMÉDIAT ===== */

sender.solde-=total;
receiverData.solde+=convertedAmount;
treasury.balance+=fee;

await update(ref(db,"users/"+sender.phone),sender);
await update(ref(db,"users/"+receiverPhone),receiverData);
await update(ref(db,"treasury"),treasury);

const tx=await push(ref(db,"history"),{
from:sender.phone,
to:receiverPhone,
amountOriginal:amount,
amountConverted:convertedAmount,
fee,
rateUsed:rate,
reason,
date:new Date().toLocaleString()
});

/* Notifications complètes avec réclamation */

await push(ref(db,"notifications/"+receiverPhone),{
title:"💰Argent reçu",
phone:sender.phone,
amount:convertedAmount,
reason,
date:new Date().toLocaleString(),
claimable:false,
seen:false
});

await push(ref(db,"notifications/"+sender.phone),{
title:"📤Argent envoyé",
phone:receiverPhone,
amount:amount,
reason,
date:new Date().toLocaleString(),
claimable:true,
seen:false,
txId:tx.key
});

messageBox.innerText="✅Transfert réussi";
resetForm();loadBalance();loadNotifications();

}catch(e){
messageBox.innerText="❌Erreur : "+e.message;
}

resetButton();
};

/* ===============================
   MOTEUR TRANSFERT PROGRAMMÉ PRO
================================ */

async function processScheduledTransfers(){

const scheduledRef = ref(db,"scheduledTransfers");
const snapshot = await get(scheduledRef);

if(!snapshot.exists()) return;

const transfers = snapshot.val();
const now = Date.now();

for(const [id, tx] of Object.entries(transfers)){

if(tx.executed === true) continue;

if(!tx.scheduledFor) continue;

const scheduledTime = new Date(tx.scheduledFor).getTime();

if(now < scheduledTime) continue;

/* ===== Récupération comptes ===== */

const senderSnap = await get(ref(db,"users/"+tx.from));
const receiverSnap = await get(ref(db,"users/"+tx.to));
const treasurySnap = await get(ref(db,"treasury"));

if(!senderSnap.exists() || !receiverSnap.exists()){
console.log("Compte introuvable");
continue;
}

let sender = senderSnap.val();
let receiver = receiverSnap.val();
let treasury = treasurySnap.exists() ? treasurySnap.val() : {balance:0,rate:0.01};

/* ===== Vérifications sécurité ===== */

if(sender.frozen || receiver.frozen){
console.log("Compte gelé");
continue;
}

let totalDebit = tx.amountOriginal + tx.fee;

if(sender.solde < totalDebit){
console.log("Solde insuffisant");
continue;
}

/* ===== Débit / Crédit ===== */

sender.solde -= totalDebit;
receiver.solde += tx.amountConverted;
treasury.balance += tx.fee;

/* ===== Mise à jour comptes ===== */

await update(ref(db,"users/"+tx.from), sender);
await update(ref(db,"users/"+tx.to), receiver);
await update(ref(db,"treasury"), treasury);

/* ===== Historique transaction ===== */

const historyRef = await push(ref(db,"history"),{
from: tx.from,
to: tx.to,
amountOriginal: tx.amountOriginal,
amountConverted: tx.amountConverted,
fee: tx.fee,
rateUsed: tx.rateUsed,
reason: tx.reason,
date: new Date().toLocaleString(),
scheduled: true,
status: "executed"
});

/* ===== Notifications ===== */

await push(ref(db,"notifications/"+tx.to),{
title:"💰 Argent reçu (programmé)",
phone:tx.from,
amount:tx.amountConverted,
date:new Date().toLocaleString(),
claimable:false
});

await push(ref(db,"notifications/"+tx.from),{
title:"📤 Argent envoyé (programmé)",
phone:tx.to,
amount:tx.amountOriginal,
date:new Date().toLocaleString(),
claimable:true,
txId:historyRef.key
});

/* ===== Marquer exécuté ===== */

await update(ref(db,"scheduledTransfers/"+id),{
executed:true,
executedAt:Date.now()
});

}

}

/* Vérification toutes les 5 secondes */
processScheduledTransfers();
setInterval(processScheduledTransfers,5000);

/* ===============================
   SYSTEME RECLAMATION PRO
================================ */

window.sendClaim = async function(txId){

const historySnap = await get(ref(db,"history/"+txId));
if(!historySnap.exists()){
alert("Transaction introuvable");
return;
}

const tx = historySnap.val();

/* Vérifier si déjà réclamé */

if(tx.claimRequested){
alert("Réclamation déjà envoyée.");
return;
}

const claimData = {
txId: txId,
from: tx.from,
to: tx.to,
amountOriginal: tx.amountOriginal,
amountConverted: tx.amountConverted,
fee: tx.fee,
reason: tx.reason || "",
date: tx.date,
status: "pending",
createdAt: Date.now()
};

/* Envoyer au service */

await push(ref(db,"serviceClaims"), claimData);

/* Marquer transaction */

await update(ref(db,"history/"+txId),{
claimRequested:true
});

alert("Votre réclamation a été envoyée au service.");
};

/* ===== NOTIFICATIONS ===== */
async function loadNotifications(){
const snap = await get(ref(db,"notifications/"+currentUser.phone));
notifBox.innerHTML = "";
let count = 0;

if(snap.exists()){
Object.entries(snap.val()).reverse().forEach(([id,n])=>{
if(!n.seen) count++;

notifBox.innerHTML += `
<div class="user-card">
<strong>${n.title}</strong><br>
📱 ${n.phone}<br>
💰 ${formatMoney(n.amount)}<br>
🕒 ${n.date}<br>
${n.reason || ""}
${n.claimable ? `<button onclick="sendClaim('${n.txId}')" style="background:red;">🚨 Réclamation</button>` : ""}
<button onclick="deleteNotif('${id}')" style="background:crimson;">🗑 Supprimer</button>
</div>`;
});
}

/* BADGE HEADER */
notifBadge.innerText = count;
notifBadge.style.display = count > 0 ? "block" : "none";

/* BADGE BOUTON 🔔 */
const miniBadge = document.getElementById("notifMiniBadge");
if(miniBadge){
miniBadge.innerText = count;
miniBadge.style.display = count > 0 ? "block" : "none";
}
}

loadNotifications();

window.deleteNotif = async function(id){
await remove(ref(db,"notifications/"+currentUser.phone+"/"+id));
loadNotifications();
};

function resetForm(){
receiverInput.value="";
amountInput.value="";
document.getElementById("reason").value="";
document.getElementById("scheduleDate").value="";
conversionBox.style.display="none";
}

function resetButton(){
sendBtn.disabled=false;
sendBtn.innerText="Envoyer";
}

window.toggleNotifications=()=>notifBox.style.display=notifBox.style.display==="none"?"block":"none";
window.togglePassword=()=>passwordBox.style.display=passwordBox.style.display==="none"?"block":"none";
window.toggleTransfer=()=>transferBox.style.display=transferBox.style.display==="none"?"block":"none";
window.logout=function(){localStorage.removeItem("loggedUser");window.location.href="login.html";};

const userMenu = document.getElementById("userMenu");

window.toggleMenu = (e) => {
e.stopPropagation();

const modal = document.getElementById("modal");

/* bloque si modal ouvert */
if(!modal.classList.contains("hidden")) return;

userMenu.classList.toggle("hidden");
};

window.changePhoto = () => {
const input = document.createElement("input");
input.type = "file";
input.accept = "image/*";

input.onchange = async (e) => {
const file = e.target.files[0];
if(!file) return;

try {
const storageRef = sRef(storage, "users/" + currentUser.phone + "_profile.jpg");

await uploadBytes(storageRef, file);

const url = await getDownloadURL(storageRef);

// 🔥 FIREBASE DATABASE
await update(ref(db, "users/" + currentUser.phone), {
photo: url
});

// 🔥 LOCAL STORAGE (MANQUAIT !!!)
currentUser.photo = url;
localStorage.setItem("loggedUser", JSON.stringify(currentUser));

// 🔥 UI UPDATE
profilePic.src = url;
menuProfilePic.src = url;

alert("✅ Photo mise à jour");

} catch(e) {
alert("❌ " + e.message);
}
};

input.click();
};

document.addEventListener("click", (e) => {
const menu = document.getElementById("userMenu");
const profile = document.querySelector(".profile-container");

if (!menu.contains(e.target) && !profile.contains(e.target)) {
menu.classList.add("hidden");
}
});

window.openModal = async function(contentId) {

const modal = document.getElementById("modal");
const modalBody = document.getElementById("modalBody");
const content = document.getElementById(contentId);

/* 🔥 RESET */
modalBody.innerHTML = "";

/* 🔥 AJOUT CONTENU */
modalBody.appendChild(content);
content.style.display = "block";

/* 🔥 AFFICHER MODAL */
modal.classList.remove("hidden");

/* =========================================
🔥 ICI ON MARQUE LES NOTIFICATIONS COMME VUES
========================================= */
if(contentId === "notifBox"){

const snap = await get(ref(db,"notifications/"+currentUser.phone));

if(snap.exists()){

Object.entries(snap.val()).forEach(([id,n])=>{

if(!n.seen){

update(ref(db,"notifications/"+currentUser.phone+"/"+id),{
seen:true
});

}

});

}

/* 🔥 RECHARGER POUR METTRE BADGE A JOUR */
setTimeout(loadNotifications, 300);

}

};

window.closeModal = function() {
const modal = document.getElementById("modal");
modal.classList.add("hidden");

/* 🔥 IMPORTANT */
document.getElementById("notifBox").style.display="none";
document.getElementById("transferBox").style.display="none";
document.getElementById("passwordBox").style.display="none";
}

async function loadHistory(){
const snap = await get(ref(db,"history"));

const historyList = document.getElementById("historyList");
historyList.innerHTML = "";

if(snap.exists()){
Object.values(snap.val()).reverse().slice(0,5).forEach(tx=>{
const isSent = tx.from === currentUser.phone;

historyList.innerHTML += `
<div class="history-item">

${isSent
? `<span class="arrow-up">⬆</span> -${tx.amountOriginal}`
: `<span class="arrow-down">⬇</span> +${tx.amountOriginal}`}

<br>
📱 ${tx.to}
<br>
🕒 ${tx.date}

<button onclick="deleteHistory('${tx.date}')" style="float:right;background:red;color:white;border:none;border-radius:8px;padding:3px 6px;">X</button>

</div>`;
});
}
}

loadHistory();

window.toggleHistory = function(){
const box = document.getElementById("historyContent");
box.style.display = box.style.display === "none" ? "block" : "none";
};

window.deleteHistory = async function(date){
const snap = await get(ref(db,"history"));
if(!snap.exists()) return;

Object.entries(snap.val()).forEach(([id,tx])=>{
if(tx.date === date){
remove(ref(db,"history/"+id));
}
});

loadHistory();
};
</script>
